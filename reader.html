<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Kami Reader Bridge</title>
  <style>
    html, body { margin: 0; padding: 0; background: #111; color: #fff; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #root { width: 100%; }
    .status { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px; color: #ddd; }
    .status .box { max-width: 680px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 14px 16px; }
    .chapter-frame { width: 100%; display: block; margin: 0; padding: 0; overflow: hidden; background: #111; }
    .chapter-img { width: 100%; height: auto; display: block; margin: 0; padding: 0; opacity: 0; transition: opacity .16s ease-out; pointer-events: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
    .chapter-img.is-ready { opacity: 1; }
  </style>
</head>
<body>
  <main id="root">
    <section class="status" id="status"><div class="box">Cargando imágenes...</div></section>
  </main>
  <script src="reader.js"></script>
</body>
</html>
